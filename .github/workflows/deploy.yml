name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply D1 migrations
        working-directory: worker
        run: npx wrangler d1 migrations apply shelf-analysis-db --remote

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Pages Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build -w frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://shelf-analysis-api.steven-walsh39.workers.dev' }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name=shelf-analysis-frontend
